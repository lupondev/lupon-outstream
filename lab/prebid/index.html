<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prebid Tester — Lupon Ad Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#08080f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;margin-bottom:24px}
.logo-icon{width:24px;height:24px;background:linear-gradient(135deg,#7c3aed,#3b82f6);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.box{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:32px;max-width:400px;width:100%;text-align:center}
.title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.sub{font-size:13px;color:#555;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#3b82f6);color:#fff;margin-right:8px}
.btn-secondary{background:#111;border:1px solid #1a1a2e;color:#666}
.btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="logo"><div class="logo-icon">⚗️</div>Lupon Ad Lab</div>
<div class="box">
  <div class="title">⚡ Prebid Auction Tester</div>
  <div class="sub">Za live Prebid auction debugging koristite <strong style="color:#a78bfa">URL Inspector</strong> — pull live data sa bilo kojeg publishera direktno kroz Lupon Intelligence ekstenziju.</div>
  <a href="/lab/inspector" class="btn btn-primary">URL Inspector →</a>
  <a href="/lab" class="btn btn-secondary">Dashboard</a>
</div>
</body>
</html>
